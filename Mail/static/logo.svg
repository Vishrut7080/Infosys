<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse-ring {
        0% { r: 72; opacity: 0.5; }
        100% { r: 96; opacity: 0; }
      }
      @keyframes pulse-ring2 {
        0% { r: 72; opacity: 0.3; }
        100% { r: 110; opacity: 0; }
      }
      @keyframes bar-breathe-1 { 0%,100%{height:10px;y:95px} 50%{height:22px;y:89px} }
      @keyframes bar-breathe-2 { 0%,100%{height:18px;y:91px} 50%{height:34px;y:83px} }
      @keyframes bar-breathe-3 { 0%,100%{height:28px;y:86px} 50%{height:48px;y:76px} }
      @keyframes bar-breathe-4 { 0%,100%{height:38px;y:81px} 50%{height:58px;y:71px} }
      @keyframes bar-breathe-5 { 0%,100%{height:46px;y:77px} 50%{height:66px;y:67px} }
      @keyframes bar-breathe-6 { 0%,100%{height:38px;y:81px} 50%{height:58px;y:71px} }
      @keyframes bar-breathe-7 { 0%,100%{height:28px;y:86px} 50%{height:48px;y:76px} }
      @keyframes bar-breathe-8 { 0%,100%{height:18px;y:91px} 50%{height:34px;y:83px} }
      @keyframes bar-breathe-9 { 0%,100%{height:10px;y:95px} 50%{height:22px;y:89px} }
      @media (prefers-reduced-motion: no-preference) {
        #pr1 { animation: pulse-ring 2.4s ease-out infinite; }
        #pr2 { animation: pulse-ring2 2.4s ease-out infinite 0.8s; }
        #b1 { animation: bar-breathe-1 1.8s ease-in-out infinite 0s; }
        #b2 { animation: bar-breathe-2 1.8s ease-in-out infinite 0.1s; }
        #b3 { animation: bar-breathe-3 1.8s ease-in-out infinite 0.2s; }
        #b4 { animation: bar-breathe-4 1.8s ease-in-out infinite 0.3s; }
        #b5 { animation: bar-breathe-5 1.8s ease-in-out infinite 0.4s; }
        #b6 { animation: bar-breathe-6 1.8s ease-in-out infinite 0.3s; }
        #b7 { animation: bar-breathe-7 1.8s ease-in-out infinite 0.2s; }
        #b8 { animation: bar-breathe-8 1.8s ease-in-out infinite 0.1s; }
        #b9 { animation: bar-breathe-9 1.8s ease-in-out infinite 0s; }
      }
    </style>
    <radialGradient id="circleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0600A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C93A00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8C38"/>
      <stop offset="100%" stop-color="#C93A00"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A1A"/>
      <stop offset="100%" stop-color="#C93A00"/>
    </linearGradient>
  </defs>

  <!-- Pulsing rings -->
  <circle id="pr1" cx="100" cy="100" r="72" fill="none" stroke="#E85A0A" stroke-width="1" opacity="0.5"/>
  <circle id="pr2" cx="100" cy="100" r="72" fill="none" stroke="#E85A0A" stroke-width="0.6" opacity="0.3"/>

  <!-- Glow -->
  <circle cx="100" cy="100" r="82" fill="url(#circleGrad)"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#D04F08" stroke-width="0.5" opacity="0.5"/>
  <!-- Dark fill -->
  <circle cx="100" cy="100" r="69" fill="#1A0D08" opacity="0.93"/>

  <!-- Soundwave bars — 9 bars, centered -->
  <!-- bar w=5, gap=4, total=(9*5)+(8*4)=45+32=77, startX=100-38=62 -->
  <rect id="b1" x="62"  y="95" width="5" height="10" rx="2.5" fill="url(#barGrad)" opacity="0.70"/>
  <rect id="b2" x="71"  y="91" width="5" height="18" rx="2.5" fill="url(#barGrad)" opacity="0.80"/>
  <rect id="b3" x="80"  y="86" width="5" height="28" rx="2.5" fill="url(#barGrad)" opacity="0.90"/>
  <rect id="b4" x="89"  y="81" width="5" height="38" rx="2.5" fill="url(#barGrad)" opacity="0.95"/>
  <rect id="b5" x="98"  y="77" width="5" height="46" rx="2.5" fill="url(#barGrad)"/>
  <rect id="b6" x="107" y="81" width="5" height="38" rx="2.5" fill="url(#barGrad)" opacity="0.95"/>
  <rect id="b7" x="116" y="86" width="5" height="28" rx="2.5" fill="url(#barGrad)" opacity="0.90"/>
  <rect id="b8" x="125" y="91" width="5" height="18" rx="2.5" fill="url(#barGrad)" opacity="0.80"/>
  <rect id="b9" x="134" y="95" width="5" height="10" rx="2.5" fill="url(#barGrad)" opacity="0.70"/>

  <!-- Tick marks -->
  <g stroke="#E06020" stroke-width="0.8" opacity="0.4">
    <line x1="100" y1="28" x2="100" y2="34"/>
    <line x1="100" y1="166" x2="100" y2="172"/>
    <line x1="28"  y1="100" x2="34"  y2="100"/>
    <line x1="166" y1="100" x2="172" y2="100"/>
    <line x1="50"  y1="50"  x2="54"  y2="56"/>
    <line x1="146" y1="144" x2="150" y2="150"/>
    <line x1="150" y1="50"  x2="146" y2="56"/>
    <line x1="54"  y1="144" x2="50"  y2="150"/>
  </g>
</svg>