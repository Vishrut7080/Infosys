<!DOCTYPE html>
<html>

<head>
    <title>Assistant Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>

<body>
    <h2>Assistant Login</h2>
    <form id="loginForm">
        <input type="text" id="username" value="{{ username }}" placeholder="Username"><br>
        <input type="password" id="password" value="" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
    <p id="message" style="color: red; margin-top: 20px;"></p>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>

</html>
