<!DOCTYPE html>
<html>

<head>
    <title>Assistant Login</title>
    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>
    <h2>Assistant Login</h2>
    <input type="text" placeholder="Username"><br>
    <input type="password" placeholder="Password"><br>
    <button onclick="check()">Login</button>

    <script>
        function checkLogin() {
            fetch('/check')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        window.location.href = "https://mail.google.com";
                    }
                });
        }

        setInterval(checkLogin, 1000);
    </script>


</body>

</html>
