<!DOCTYPE html>
<html lang="en">

<head>
    <title>Telegram Auth</title>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Instrument Sans', sans-serif;
            background: #0f0f13;
            color: #ededf0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            background: #17171d;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 40px;
            width: 360px;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 6px;
        }

        p {
            font-size: 13px;
            color: #7f7f99;
            margin-bottom: 24px;
        }

        label {
            font-size: 12px;
            color: #7f7f99;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background: #0f0f13;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 7px;
            color: #ededf0;
            font-size: 14px;
            outline: none;
            margin-bottom: 16px;
        }

        input:focus {
            border-color: #6c63ff;
        }

        button {
            width: 100%;
            padding: 11px;
            background: #6c63ff;
            border: none;
            border-radius: 7px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #7b74ff;
        }

        #msg {
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            min-height: 20px;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Telegram Login</h2>
        <p>Enter your phone number to receive an OTP from Telegram.</p>

        <!-- Step 1: Phone -->
        <div class="step active" id="step1">
            <label>Phone number (with country code)</label>
            <input type="tel" id="phone" placeholder="+91xxxxxxxxxx">
            <button onclick="sendCode()">Send OTP</button>
        </div>

        <!-- Step 2: OTP -->
        <div class="step" id="step2">
            <label>OTP code sent to your Telegram app</label>
            <input type="text" id="otp" placeholder="12345">
            <button onclick="submitOtp()">Verify</button>
        </div>

        <p id="msg"></p>
    </div>

    <script>
        let phoneNumber = '';

        async function sendCode() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) return;
            phoneNumber = phone;
            document.getElementById('msg').innerText = 'Sending OTP...';

            const res = await fetch('/telegram/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await res.json();

            if (data.status === 'ok') {
                document.getElementById('step1').classList.remove('active');
                document.getElementById('step2').classList.add('active');
                document.getElementById('msg').innerText = 'OTP sent. Check your Telegram app.';
            } else {
                document.getElementById('msg').style.color = '#f87171';
                document.getElementById('msg').innerText = data.message || 'Failed to send OTP.';
            }
        }

        async function submitOtp() {
            const otp = document.getElementById('otp').value.trim();
            if (!otp) return;
            document.getElementById('msg').innerText = 'Verifying...';

            const res = await fetch('/telegram/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phoneNumber, otp })
            });
            const data = await res.json();

            if (data.status === 'ok') {
                document.getElementById('msg').style.color = '#4ade80';
                document.getElementById('msg').innerText = 'Telegram connected! Redirecting to dashboard…';
                setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
            } else {
                document.getElementById('msg').style.color = '#f87171';
                document.getElementById('msg').innerText = data.message || 'Invalid OTP.';
            }
        }
    </script>
</body>

</html>
